<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editor VIP Completo</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>
body{margin:0;display:flex;height:100vh;font-family:Montserrat;}
.panel{width:30%;background:#f4f4f4;padding:15px;overflow:auto;}
.preview{width:70%;overflow:auto;background:#fdfaf5;}

input,textarea{width:100%;margin:5px 0;padding:8px;}

.hero{height:100vh;background-size:cover;display:flex;align-items:center;justify-content:center;color:white;text-align:center;}
.overlay{background:rgba(0,0,0,0.4);padding:20px;}

.section{padding:40px;text-align:center;}

.btn{background:black;color:white;padding:10px 20px;text-decoration:none;}
</style>
</head>

<body>

<div class="panel">

<h2>EDITOR</h2>

<input id="nombres" placeholder="Ariel & Samanta">
<input id="frase" placeholder="Frase">
<input id="fecha" placeholder="Fecha">
<input id="fechaISO" placeholder="Fecha contador">

<input id="portada" placeholder="Imagen portada">
<input id="musica" placeholder="Música">

<textarea id="historia" placeholder="Historia"></textarea>

<textarea id="galeria" placeholder="Fotos (una por línea)"></textarea>

<input id="telefono" placeholder="WhatsApp">

<input id="ciudad" placeholder="Ciudad clima">

<button onclick="actualizar()">Actualizar</button>

</div>

<div class="preview">

<div class="hero" id="hero">
<div class="overlay">
<h1 id="p_nombres">Ariel & Samanta</h1>
<p id="p_frase">Nuestra boda</p>
<p id="p_fecha">25.10.2026</p>
<div id="contador"></div>
</div>
</div>

<div class="section">
<h2>Historia</h2>
<p id="p_historia"></p>
</div>

<div class="section">
<h2>Galería</h2>
<div id="p_galeria"></div>
</div>

<div class="section">
<h2>Clima</h2>
<div id="p_clima"></div>
</div>

<div class="section">
<a id="p_whatsapp" class="btn" target="_blank">Confirmar asistencia</a>
</div>

  <script>

function actualizar(){

p_nombres.innerText = nombres.value;
p_frase.innerText = frase.value;
p_fecha.innerText = fecha.value;
p_historia.innerText = historia.value;

hero.style.backgroundImage = `url(${portada.value})`;

// GALERÍA
p_galeria.innerHTML="";
galeria.value.split("\n").forEach(img=>{
if(img.trim()!=""){
p_galeria.innerHTML+=`<img src="${img}" style="width:80%;margin:10px;border-radius:10px;">`;
}
});

// WHATSAPP
p_whatsapp.href = "https://wa.me/"+telefono.value+"?text=Confirmo asistencia";

// CLIMA
p_clima.innerHTML = `
<a class="weatherwidget-io" href="https://forecast7.com">Clima</a>
<script src="https://weatherwidget.io/js/widget.min.js"><\/script>
`;

// MÚSICA
if(musica.value){
let audio=document.getElementById("audio");
if(!audio){
audio=document.createElement("audio");
audio.id="audio";
audio.autoplay=true;
audio.loop=true;
document.body.appendChild(audio);
}
audio.src=musica.value;
}

// CONTADOR
const fechaEvento = new Date(fechaISO.value);
setInterval(()=>{
const ahora = new Date();
const diff = fechaEvento - ahora;
const dias = Math.floor(diff/(1000*60*60*24));
document.getElementById("contador").innerHTML = dias+" días";
},1000);

}

// INVITADO PERSONALIZADO
const params = new URLSearchParams(window.location.search);
const nombre = params.get('n');
if(nombre){
document.body.insertAdjacentHTML("afterbegin",
"<h2>Bienvenido "+decodeURIComponent(nombre)+"</h2>");
}

</script>

</body>
</html>
