<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador VIP Migrandia</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Montserrat;display:flex;height:100vh;}
.panel{width:40%;padding:20px;background:#f4f4f4;overflow:auto;}
.preview{width:60%;background:#fff;overflow:auto;}

input,textarea,select{
width:100%;margin:5px 0;padding:8px;
}

.hero{
height:50vh;
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
text-align:center;
}

.overlay{
background:rgba(0,0,0,0.4);
padding:20px;
}

button{
padding:10px;
background:black;
color:white;
border:none;
cursor:pointer;
margin-top:10px;
}
</style>
</head>

<body>

<div class="panel">

<h2>Editor VIP</h2>

<input id="nombres" placeholder="Ariel & Samanta">
<input id="fecha" placeholder="25 Octubre 2026">
<input id="fechaISO" placeholder="2026-10-25T17:00:00">

<input id="portada" placeholder="URL portada">
<input id="musica" placeholder="URL música">

<input id="telefono" placeholder="WhatsApp 521...">
<input id="ciudad" placeholder="Ciudad clima">

<label>Color principal</label>
<input type="color" id="color" value="#b8926a">

<label>Tipografía</label>
<select id="fuente">
<option value="Playfair Display">Elegante</option>
<option value="Montserrat">Moderna</option>
<option value="Cormorant Garamond">Romántica</option>
</select>

<textarea id="galeria" placeholder="Fotos (una por línea)"></textarea>

<button onclick="generar()">GENERAR HTML</button>

<pre id="output"></pre>

</div>

<div class="preview">

<div class="hero" id="hero">
<div class="overlay">
<h1 id="p_nombres"></h1>
<p id="p_fecha"></p>
</div>
</div>

</div>

<script>

const inputs = document.querySelectorAll("input,textarea,select");

inputs.forEach(i => i.addEventListener("input", preview));

function preview(){
p_nombres.innerText = nombres.value;
p_fecha.innerText = fecha.value;
hero.style.backgroundImage = `url(${portada.value})`;
}

function generar(){

const data = {
nombres:nombres.value,
fecha:fecha.value,
fechaISO:fechaISO.value,
portada:portada.value,
musica:musica.value,
telefono:telefono.value,
ciudad:ciudad.value,
color:color.value,
fuente:fuente.value,
galeria:galeria.value.split("\n")
};

const html = `
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=${data.fuente.replace(" ","+")}&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'${data.fuente}';background:#000;color:#fff;text-align:center;}
.hero{height:100vh;background:url('${data.portada}') center/cover;display:flex;align-items:center;justify-content:center;}
.overlay{background:rgba(0,0,0,0.4);padding:20px;}
h1{color:${data.color};}

.btn{background:${data.color};padding:10px 20px;color:white;text-decoration:none;display:inline-block;margin:10px;}
.galeria img{width:80%;margin:10px;border-radius:10px;}
</style>

</head>

<body>

<audio autoplay loop>
<source src="${data.musica}">
</audio>

<div class="hero">
<div class="overlay">
<h1>${data.nombres}</h1>
<p>${data.fecha}</p>
<div id="contador"></div>
</div>
</div>

<div class="galeria">
${data.galeria.map(img=>`<img src="${img}">`).join("")}
</div>

<a class="btn" href="https://wa.me/${data.telefono}?text=Confirmo asistencia">Confirmar</a>

<script>

const fechaEvento = new Date("${data.fechaISO}");

setInterval(()=>{
const ahora = new Date();
const diff = fechaEvento - ahora;
const dias = Math.floor(diff/(1000*60*60*24));
document.getElementById("contador").innerHTML = dias + " días";
},1000);

// PERSONALIZACIÓN INVITADO
const urlParams = new URLSearchParams(window.location.search);
const nombre = urlParams.get('n');

if(nombre){
document.body.insertAdjacentHTML("afterbegin",
"<h2>Bienvenido "+decodeURIComponent(nombre)+"</h2>");
}

<\/script>

</body>
</html>
`;

const blob = new Blob([html], {type:"text/html"});
const a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "invitacion-vip.html";
a.click();

}

</script>

</body>
</html>
