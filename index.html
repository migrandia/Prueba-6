<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editor Invitación VIP</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Montserrat;}
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1519741497674-611481863552') center/cover;
display:flex;align-items:center;justify-content:center;
color:#fff;text-align:center;
}
.hero h1{font-size:50px}
.panel{
position:fixed;
left:0;top:0;
width:260px;height:100%;
background:#111;
color:#fff;padding:15px;
overflow:auto;
z-index:999;
}
.panel input,.panel textarea{
width:100%;margin-bottom:10px;padding:8px;
border:none;
}
.panel button{
width:100%;padding:10px;margin-top:5px;
background:#c9a26d;color:#fff;border:none;
cursor:pointer;
}
.content{margin-left:260px}
</style>
</head>

<body>

<div class="panel">
<h3>EDITOR VIP PRO</h3>

<input id="nombres" placeholder="Nombres">
<input id="fecha" placeholder="Fecha">
<input id="img" placeholder="Imagen portada URL">
<input id="whats" placeholder="WhatsApp">
<textarea id="historia" placeholder="Historia"></textarea>

<button onclick="aplicar()">APLICAR</button>
<button onclick="guardar()">GUARDAR</button>

</div>

<div class="content">

<header class="hero" id="portada">
<div>
<h1 id="txt_nombres">Ariel & Samanta</h1>
<p id="txt_fecha">25.10.2026</p>
</div>
</header>

<section style="padding:40px;text-align:center">
<h2>Historia</h2>
<p id="txt_historia">
Nuestra historia de amor comienza...
</p>
</section>

<section style="padding:40px;text-align:center">
<button onclick="confirmar()">Confirmar por WhatsApp</button>
</section>

</div>

    <script>

function aplicar(){
document.getElementById("txt_nombres").innerText =
document.getElementById("nombres").value;

document.getElementById("txt_fecha").innerText =
document.getElementById("fecha").value;

document.getElementById("txt_historia").innerText =
document.getElementById("historia").value;

let img = document.getElementById("img").value;
if(img){
document.getElementById("portada").style.backgroundImage = "url("+img+")";
}
}

function confirmar(){
let tel = document.getElementById("whats").value || "521000000000";
window.open("https://wa.me/"+tel);
}

function guardar(){
let datos = {
nombres: nombres.value,
fecha: fecha.value,
img: img.value,
historia: historia.value,
whats: whats.value
};
localStorage.setItem("vip", JSON.stringify(datos));
alert("Guardado");
}

window.onload = ()=>{
let d = JSON.parse(localStorage.getItem("vip"));
if(d){
nombres.value=d.nombres;
fecha.value=d.fecha;
img.value=d.img;
historia.value=d.historia;
whats.value=d.whats;
aplicar();
}
}

</script>

</body>
</html>
