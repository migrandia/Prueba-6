<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editor VIP REAL</title>

<style>
#editor{
position:fixed;
top:0;
left:0;
width:100%;
background:#111;
color:white;
z-index:9999;
padding:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}
#editor input, #editor textarea{
padding:5px;
}
body{margin-top:140px;}
</style>
</head>

<body>

<div id="editor">

<input id="edit_nombres" placeholder="Nombres">
<input id="edit_fecha" placeholder="Fecha">
<input id="edit_portada" placeholder="Imagen portada">
<input id="edit_whatsapp" placeholder="WhatsApp">

<textarea id="edit_historia" placeholder="Historia"></textarea>

<button onclick="aplicarCambios()">APLICAR</button>

</div>

<script>

function aplicarCambios(){

// NOMBRES
document.querySelector(".hero h1").innerText = edit_nombres.value;

// FECHA
document.querySelector(".hero p").innerText = edit_fecha.value;

// PORTADA
document.querySelector(".hero").style.backgroundImage =
"linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('"+edit_portada.value+"')";

// HISTORIA
document.querySelectorAll(".sec p")[0].innerText = edit_historia.value;

// WHATSAPP
const btn = document.querySelector(".btn-confirm");
if(btn){
btn.onclick = function(){
window.open("https://wa.me/"+edit_whatsapp.value);
}
}

}

</script>
